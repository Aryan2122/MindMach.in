<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>$title | MindMach Insights</title>
  <meta name="description" content="$deck">
  <link rel="stylesheet" href="/index-DcSPR8pZ.css">
</head>
<body class="noise-overlay">
  <header id="top">
    <div class="wrap row">
      <a class="brand" href="/">
        <img src="/favicon.svg" alt="MindMach">
        <span>MindMach</span>
      </a>
      <nav class="navlinks">
        <a href="/#services">Services</a>
        <a href="/#about">About</a>
        <a href="/insights/">Insights</a>
        <a href="/#contact" class="btn btn-primary">Talk to us</a>
      </nav>
    </div>
  </header>

  <main class="wrap" style="padding:56px 0 80px; max-width: 860px;">
    <a href="/insights/" style="font-size:14px;color:var(--ink-soft);text-decoration:none;display:inline-block;margin-bottom:18px;">← Back to Insights</a>

    <div class="eyebrow">$category · $date</div>
    <h1 style="margin-top:14px;">$title</h1>
    <p style="max-width:720px;color:var(--ink-soft);font-size:1.05rem;margin:14px 0 28px;">
      $deck
    </p>

    <section style="background:var(--paper-alt);border:1px solid var(--line);padding:22px 24px;border-radius:6px;margin:0 0 28px;">
      <h2 style="font-size:18px;margin:0 0 12px;">Key findings</h2>
      <ul style="margin:0;padding-left:20px;">
        $findings
      </ul>
    </section>

    <article>
      $sections
    </article>

    <blockquote style="margin:36px 0;padding:22px 24px;border-left:3px solid var(--navy);background:var(--paper-alt);font-family:Fraunces,serif;font-size:1.25rem;line-height:1.45;">
      $pull_quote
    </blockquote>

    <section style="background:var(--paper-alt);border:1px solid var(--line);padding:22px 24px;border-radius:6px;margin:0 0 28px;">
      <h2 style="font-size:18px;margin:0 0 12px;">Key takeaways</h2>
      <ul style="margin:0;padding-left:20px;">
        $takeaways
      </ul>
    </section>

    <p style="color:var(--ink-soft);margin:0;">
      <strong style="color:var(--ink);">$author</strong>, $author_title
    </p>
  </main>
</body>
</html>
