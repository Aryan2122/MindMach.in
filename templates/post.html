<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>$title | MindMach Insights</title>
<meta name="description" content="$deck">
<link rel="stylesheet" href="/assets/style.css">
</head>
<body>

<div class="wrap post-wrap">

  <a href="/insights/" class="back-link">← Back to Insights</a>

  <div class="post-meta">
    <span class="ic-tag">$category</span>
    <span class="post-date">$date</span>
  </div>

  <h1 class="post-title">$title</h1>
  <p class="post-deck">$deck</p>

  <div class="post-findings">
    <h3 class="findings-heading">Key findings</h3>
    <ul class="findings-list">$findings</ul>
  </div>

  <div class="post-body">
    $sections
  </div>

  <blockquote class="post-pullquote">$pull_quote</blockquote>

  <div class="post-takeaways">
    <h3 class="takeaways-heading">Key takeaways</h3>
    <ul class="takeaways-list">$takeaways</ul>
  </div>

  <div class="post-author">
    <p><strong>$author</strong>, $author_title</p>
  </div>

</div>

</body>
</html>
