name: Build Insights
on:
  push:
    branches: [Insights-fv-21]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python build.py
      - name: Commit generated files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add insights/
          git commit -m "Auto-build insights pages" || echo "No changes"
          git push
